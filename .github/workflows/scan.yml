name: SMC Scan

on:
  schedule:
    # Weekdays only (Mon-Fri). All times UTC.
    # GitHub-hosted runners can be a few minutes late under load — don't
    # rely on second-level precision.
    - cron: '0 7 * * 1-5'    # 07:00 UTC (07:00 GMT — pre-Europe open)
    - cron: '0 13 * * 1-5'   # 13:00 UTC (14:00 GMT — pre-US open)
    - cron: '0 15 * * 1-5'   # 15:00 UTC (16:00 GMT — post-US open)
    - cron: '0 20 * * 1-5'   # 20:00 UTC (21:00 GMT — evening)
  workflow_dispatch: {}

# Cancel an older run if a new schedule fires while it's still going. Cheap
# safety net — scans should normally finish in under a minute.
concurrency:
  group: smc-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        id: scan
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          MASSIVE_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          PYTHONIOENCODING: utf-8
        run: |
          set -o pipefail
          python scan.py 2>&1 | tee scan_output.txt

          # Detect take-trade signals from the marker line printed by scan.py.
          if grep -q '^TAKE TRADE:' scan_output.txt; then
            symbols=$(grep '^TAKE TRADE:' scan_output.txt | awk '{print $3}' | paste -sd ',' -)
            echo "fired=true" >> "$GITHUB_OUTPUT"
            echo "symbols=$symbols" >> "$GITHUB_OUTPUT"
            echo "::notice title=Signal fired::$symbols"
          else
            echo "fired=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email on take-trade
        if: steps.scan.outputs.fired == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_PASSWORD }}
          from: Trading Bot <${{ secrets.GMAIL_USERNAME }}>
          to: ${{ secrets.EMAIL_TO }}
          subject: "Trading Bot — Signal fired: ${{ steps.scan.outputs.symbols }}"
          body: file://scan_output.txt
          convert_markdown: false

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: |
            scan_results.json
            scan_output.txt
            trading_bot.log
          if-no-files-found: warn
          retention-days: 30
